services:
  postgres:
    image: postgres:16-alpine
    container_name: allyHomework
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: homework
    ports:
      - "5432:5432"
    volumes:
      - todo_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d homework"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: populate the DB once Postgres is healthy, then exit.
  seed:
    build: .
    image: todo-homework:latest
    command: ["/app/seed"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://admin:todo@postgres:5432/homework?sslmode=disable"

  # The GraphQL API + static UI on :8080, started after seeding completes.
  api:
    build: .
    image: todo-homework:latest
    restart: unless-stopped
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgres://admin:todo@postgres:5432/homework?sslmode=disable"
      ADDR: ":8080"
      # Set LOG_LEVEL=debug to surface per-resolver timing traces.
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    ports:
      - "8080:8080"

volumes:
  todo_pgdata:
