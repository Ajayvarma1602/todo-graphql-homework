services:
  postgres:
    image: postgres:16-alpine
    container_name: allyHomework
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: homework
    ports:
      - "5432:5432"
    volumes:
      - todo_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d homework"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  todo_pgdata:
